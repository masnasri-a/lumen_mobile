name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'          # trigger saat push tag, contoh: v1.0.0
  workflow_dispatch:       # bisa trigger manual dari GitHub

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Build Android APK
  # ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode keystore dari GitHub Secrets
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      # Buat file key.properties untuk signing
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build iOS IPA
  # ─────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # Import certificate (.p12) dari GitHub Secrets
      - name: Import Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      # Install provisioning profile dari GitHub Secrets
      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build IPA (release)
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Create GitHub Release & Update AltStore Source
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: dist/

      - name: Rename files
        run: |
          mv dist/app-release.apk dist/lumen-${{ steps.version.outputs.version }}.apk
          mv dist/*.ipa dist/lumen-${{ steps.version.outputs.version }}.ipa

      # Buat GitHub Release dan upload kedua file
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Lumen v${{ steps.version.outputs.version }}
          body: |
            ## Lumen v${{ steps.version.outputs.version }}

            ### Download
            - **Android**: Download `lumen-${{ steps.version.outputs.version }}.apk`
            - **iOS (AltStore)**: Tambahkan source di bawah ke AltStore

            ### AltStore Source URL
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/altsource.json
            ```
          files: |
            dist/lumen-${{ steps.version.outputs.version }}.apk
            dist/lumen-${{ steps.version.outputs.version }}.ipa
          draft: false
          prerelease: false

      # Update altsource.json dengan versi baru dan commit ke repo
      - name: Update AltStore Source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/lumen-${VERSION}.ipa"
          IPA_SIZE=$(stat -c%s dist/lumen-${VERSION}.ipa 2>/dev/null || stat -f%z dist/lumen-${VERSION}.ipa)

          # Inject versi baru ke index 0 di array versions
          jq --arg version "$VERSION" \
             --arg date "$DATE" \
             --arg url "$IPA_URL" \
             --argjson size "$IPA_SIZE" \
             '.apps[0].versions = [{"version": $version, "date": $date, "downloadURL": $url, "size": $size, "localizedDescription": "Lihat release notes di GitHub."}] + .apps[0].versions' \
             altsource.json > altsource.tmp.json
          mv altsource.tmp.json altsource.json

      - name: Commit updated altsource.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altsource.json
          git commit -m "chore: update altsource.json to v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
