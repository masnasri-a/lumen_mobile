name: lumen
description: "Lumen - A personal finance management app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_sign_in: ^7.2.0
  flutter_svg: ^2.2.4

  # HTTP client
  dio: ^5.8.0+1

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # State management
  provider: ^6.1.5

  # File save + share for CSV export
  path_provider: ^2.1.4
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/google.svg
    - assets/lumen_logo.png

  fonts:
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
